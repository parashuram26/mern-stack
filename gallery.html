<!DOCTYPE html>
<html>
<head>
<title>Simple Photo Gallery</title>
<style>
body{
    font-family: Arial;
    background-color: #f4f4f4;
    text-align: center;
}
h1{
    color: #333;
}
.gallery{
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
}
.photo{
    margin: 10px;
    border: 2px solid #ddd;
    border-radius: 10px;
    overflow: hidden;
    width: 200px;
    background: white;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    transition: transform 0.3s;
}
.photo:hover{
    transform: scale(1.05);
}

.photo img{
    width: 100%;
    height: 150px;
}
.caption{
    padding: 10px;
    font-weight: bold;
}
</style>
</head>
<body>
<h1>My Photo Gallery</h1>
<div class="gallery">
<div class="photo">
<img src="https://picsum.photos/200/150?1">
<div class="caption">Beautiful Nature</div>
</div>
<div class="photo">
<img src="https://picsum.photos/200/150?2">
<div class="caption">Mountains</div>
</div>
<div class="photo">
<img src="https://picsum.photos/200/150?3">
<div class="caption">River View</div>
</div>
</body>
</html>
